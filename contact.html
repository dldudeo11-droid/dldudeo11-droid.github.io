  <meta name="twitter:title" content="문의 · 대구 비르투오조 챔버" />
  <meta name="twitter:description" content="대구 비르투오조 챔버 공연 섭외·협업 문의 — Daegu Virtuoso Chamber contact." />
  <meta name="twitter:image" content="https://daeguvirtuoso.com/images/stage/group.jpg" />
</head>
<body data-page="contact">
  <header class="site-header" id="hdr"></header>
  <div id="mnav"></div>

  <main>
    <section class="pagehead wrap">
      <p class="eyebrow" data-i18n="contact.eyebrow"></p>
      <h1 class="h-xl" data-i18n="contact.title"></h1>
      <p class="lead" style="max-width:50ch;margin-top:14px" data-i18n="contact.lede"></p>
    </section>

    <section class="section wrap">
      <div class="contact-grid">
        <div>
          <p class="contact-desc" style="margin-top:0" data-i18n="contact.desc"></p>
          <div class="contact-meta">
            <div class="row"><span class="k" data-i18n="contact.email_label"></span><a class="v" id="cmail" href="#"></a></div>
            <div class="row"><span class="k">Instagram</span><a class="v" id="cinsta" href="#" target="_blank" rel="noopener"></a></div>
            <div class="row"><span class="k" data-i18n="contact.blog_label"></span><a class="v" id="cblog" href="#" target="_blank" rel="noopener"></a></div>
            <div class="row"><span class="k" data-i18n="contact.location_label"></span><span class="v" data-i18n="contact.location"></span></div>
          </div>
        </div>

        <form class="dvc-form reveal" onsubmit="return sendMail(this)">
          <div class="field">
            <label data-i18n="form.who"></label>
            <input name="who" required data-i18n-attr="placeholder:form.who_ph" />
          </div>
          <div class="field">
            <label data-i18n="form.contact"></label>
            <input name="contact" required data-i18n-attr="placeholder:form.contact_ph" />
          </div>
          <div class="field">
            <label data-i18n="form.type"></label>
            <select name="type">
              <option data-i18n="form.type_perf"></option>
              <option data-i18n="form.type_collab"></option>
              <option data-i18n="form.type_etc"></option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="form.when"></label>
            <input name="when" data-i18n-attr="placeholder:form.when_ph" />
          </div>
          <div class="field">
            <label data-i18n="form.msg"></label>
            <textarea name="msg" required data-i18n-attr="placeholder:form.msg_ph"></textarea>
          </div>
          <div class="submit-row">
            <button class="btn btn--solid" type="submit"><span data-i18n="form.send"></span> <span class="ar">→</span></button>
            <p class="form-note" data-i18n="form.note"></p>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="ftr"></footer>
  <script src="js/data.js"></script>
  <script src="js/i18n-bundle.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var c = window.DVC_DATA.contact || {};
      var a = document.getElementById("cmail");
      if (a) { a.href = "mailto:" + (c.email || ""); a.textContent = c.email || ""; }
      var ig = document.getElementById("cinsta");
      if (ig && c.instagram) { ig.href = c.instagram; ig.textContent = c.instagram_handle || "@dg_v_chamber"; }
      var bl = document.getElementById("cblog");
      if (bl && c.blog) { bl.href = c.blog; bl.textContent = c.blog_handle || "blog.naver.com/dg_virtuoso_chamber"; }
    });
  </script>
</body>
</html>
